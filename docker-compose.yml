services:
  gado-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gado-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - gado-data:/app/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Data Source=/app/data/gado.sqlite
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  gado-data:
    driver: local
