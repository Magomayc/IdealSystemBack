services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gado-sqlserver
    restart: unless-stopped
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=SuaSenhaForte123!
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql

  gado-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gado-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - sqlserver
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Server=sqlserver;Database=GadoDB;User Id=sa;Password=SuaSenhaForte123!;TrustServerCertificate=True;
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  sqlserver-data:
    driver: local
