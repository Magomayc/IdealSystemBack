# ============================================
# CI/CD Pipeline - Deploy Gado API na Hostinger VPS
# ============================================
# Dispara automaticamente ao fazer push na branch main.
# 
# SECRETS NECESSÁRIOS no GitHub (Settings > Secrets > Actions):
#   - DOCKERHUB_USERNAME  : Seu usuário do Docker Hub
#   - DOCKERHUB_TOKEN     : Access Token do Docker Hub (não a senha!)
#   - VPS_HOST            : IP do seu VPS Hostinger (ex: 123.456.789.0)
#   - VPS_USERNAME        : Usuário SSH do VPS (geralmente "root")
#   - VPS_SSH_KEY         : Chave privada SSH para acessar o VPS
#   - VPS_PORT            : Porta SSH (padrão: 22)
# ============================================

name: 🚀 Deploy Gado API

on:
  push:
    branches: [main]
  workflow_dispatch: # Permite disparo manual pelo GitHub

env:
  IMAGE_NAME: gado-api
  CONTAINER_NAME: gado-api

jobs:
  # ----------------------------------------
  # Job 1: Build & Testes
  # ----------------------------------------
  build:
    name: 🔨 Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: 📦 Restore de dependências
        run: dotnet restore Gado.Api/Gado.Api.csproj

      - name: 🏗️ Build do projeto
        run: dotnet build Gado.Api/Gado.Api.csproj --configuration Release --no-restore

  # ----------------------------------------
  # Job 2: Build da Imagem Docker & Push
  # ----------------------------------------
  docker:
    name: 🐳 Docker Build & Push
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔐 Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build & Push da imagem
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------
  # Job 3: Deploy no VPS Hostinger
  # ----------------------------------------
  deploy:
    name: 🚀 Deploy no VPS
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 📂 Copiar docker-compose para o VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.yml"
          target: "/opt/gado-api"

      - name: 🚀 Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            echo "🔐 Login no Docker Hub..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "📥 Puxando imagem mais recente..."
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "🛑 Parando container atual (se existir)..."
            docker stop ${{ env.CONTAINER_NAME }} 2>/dev/null || true
            docker rm ${{ env.CONTAINER_NAME }} 2>/dev/null || true

            echo "🚀 Subindo novo container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              --restart unless-stopped \
              -p 8080:8080 \
              -v gado-data:/app/data \
              -e ASPNETCORE_ENVIRONMENT=Production \
              -e "ConnectionStrings__DefaultConnection=Data Source=/app/data/gado.sqlite" \
              ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            echo "🧹 Limpando imagens antigas..."
            docker image prune -af --filter "until=24h"

            echo "✅ Deploy concluído com sucesso!"
            docker ps | grep ${{ env.CONTAINER_NAME }}
